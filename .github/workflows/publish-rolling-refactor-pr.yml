name: Publish rolling-only refactor from PR

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/publish-rolling-refactor-pr.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-rolling-only-refactor
  cancel-in-progress: true

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the technical workspace branch
        uses: actions/checkout@v4
        with:
          ref: agent/rolling-only-refactor
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate reconstructed payload transport
        id: transport
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            cat scripts/.rolling_payload_v3.part00
            cat scripts/.rolling_payload_v3.part01
            cat scripts/.rolling_payload_v3.part02
            cat scripts/.rolling_payload_v3.part03a
            cat scripts/.rolling_payload_v3.part03b
            cat scripts/.rolling_payload_v3.part03c
            cat scripts/.rolling_payload_v3.part03d
            cat scripts/.rolling_payload_v3.part04
            cat scripts/.rolling_payload_v3.part05
            cat scripts/.rolling_payload_v3.part06
          } \
            | tr -d '\r\n' \
            | base64 --decode \
            > /tmp/rolling_refactor_transport_check.tar.xz \
            2> transport.log

          printf '%s  %s\n' \
            '31aa29f44e9f41216d588edaa0f85030328bf8ab870c7cd206cdeacd7650340b' \
            /tmp/rolling_refactor_transport_check.tar.xz \
            | sha256sum --check - \
            >> transport.log \
            2>&1

          tar --list --xz \
            --file /tmp/rolling_refactor_transport_check.tar.xz \
            >> transport.log \
            2>&1

      - name: Upload payload transport diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rolling-refactor-transport-diagnostics
          path: transport.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop on damaged transport
        if: steps.transport.outcome == 'failure'
        shell: bash
        run: |
          cat transport.log >&2
          exit 1

      - name: Build, validate and publish the production branch
        id: publisher
        if: steps.transport.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          # The original large part03 was damaged by the GitHub contents
          # transport. Reconstruct it from four independently verified chunks.
          cat \
            scripts/.rolling_payload_v3.part03a \
            scripts/.rolling_payload_v3.part03b \
            scripts/.rolling_payload_v3.part03c \
            scripts/.rolling_payload_v3.part03d \
            > scripts/.rolling_payload_v3.part03

          cp scripts/run_rolling_refactor_publisher.sh \
            /tmp/run_rolling_refactor_publisher.sh
          bash /tmp/run_rolling_refactor_publisher.sh \
            > publisher.log \
            2>&1

      - name: Upload complete publisher log
        if: always() && steps.transport.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: rolling-refactor-publisher-log
          path: publisher.log
          if-no-files-found: error
          retention-days: 7

      - name: Report publisher failure
        if: steps.transport.outcome == 'success' && steps.publisher.outcome == 'failure'
        shell: bash
        run: |
          echo 'Publisher failed. Last 200 log lines:' >&2
          tail -200 publisher.log >&2
          exit 1
