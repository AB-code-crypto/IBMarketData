name: Publish rolling-only refactor from PR

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/publish-rolling-refactor-pr.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-rolling-only-refactor
  cancel-in-progress: true

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the technical workspace branch
        uses: actions/checkout@v4
        with:
          ref: agent/rolling-only-refactor
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build, validate and publish the production branch
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/run_rolling_refactor_publisher.sh /tmp/run_rolling_refactor_publisher.sh
          bash /tmp/run_rolling_refactor_publisher.sh
