name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      IB_HOST: 127.0.0.1
      IB_PORT: "7497"
      IB_CLIENT_ID: "200"
      IB_ACCOUNT_ID: U0000000
      TELEGRAM_BOT_TOKEN: test-token
      TELEGRAM_CHAT_ID: "-1000000000000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Verify rolling-only architecture
        run: python scripts/verify_rolling_refactor.py .

      - name: Verify target architecture boundaries
        run: python scripts/verify_target_architecture.py .

      - name: Validate target catalog artifacts
        run: |
          python scripts/validate_target_catalog.py catalog \
            --resolve-active-at 2026-07-23T00:00:00Z

      - name: Validate shadow position-feed store
        env:
          IBMD_DEPLOYMENT_ID: ci-position-feed
          IBMD_DATA_ROOT: /tmp/ibmd-position-feed-ci
          IBMD_APPLICATION_VERSION: ci
        run: |
          rm -rf "$IBMD_DATA_ROOT"
          python scripts/run_target_migrations.py \
            --manifest migrations/position_feed.v1.json \
            --database "$IBMD_DATA_ROOT/position_feed/broker_positions.sqlite3" \
            --application-version "$IBMD_APPLICATION_VERSION" \
            --apply
          python apps/run_position_feed_v2.py --validate-store-only

      - name: Run smoke, integration and characterization tests
        run: |
          python -m unittest \
            tester.rolling_signal_smoke_tester \
            tester.rolling_price_pipeline_tester \
            tester.execution_sqlite_locking_tester \
            tester.current_system_behavior_characterization_tester \
            tester.current_system_recovery_characterization_tester \
            tester.current_system_liquidation_characterization_tester \
            tester.target_foundation_tester \
            tester.target_catalog_tester \
            tester.target_architecture_boundary_tester \
            tester.target_position_feed_tester \
            -v

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Check diff and changed Python files
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee lint.log) 2>&1

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          # Markdown uses two trailing spaces intentionally for hard line breaks.
          # Keep whitespace validation strict for code/configuration files.
          git diff --check "$base_sha" HEAD -- . ':!*.md' ':!**/*.md'

          mapfile -d '' changed_python < <(
            git diff \
              --name-only \
              --diff-filter=ACMR \
              -z \
              "$base_sha" \
              HEAD \
              -- '*.py'
          )

          if (( ${#changed_python[@]} > 0 )); then
            ruff check --ignore E402 "${changed_python[@]}"
          fi

      - name: Upload lint diagnostics
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint.log

      - name: Fail when lint validation failed
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Import critical production and target modules
        run: |
          python - <<'PY'
          import importlib
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('src').resolve()))

          modules = (
              'core.price_source',
              'ib_signal.signal_candidates',
              'ib_signal.signal_runner',
              'ib_trader.trade_decision_service',
              'ib_execution.emergency_close',
              'ib_execution.execution_loop',
              'wt_run.launcher',
              'ibmd.foundation.config',
              'ibmd.foundation.process_lock',
              'ibmd.public_contracts.envelope',
              'ibmd.public_contracts.health',
              'ibmd.public_contracts.positions',
              'ibmd.operations.health.filesystem',
              'ibmd.operations.migrations.runner',
              'ibmd.catalog.store',
              'ibmd.catalog.resolver',
              'ibmd.ib_gateway.positions',
              'ibmd.ib_gateway.ib_async_positions',
              'ibmd.position_feed.application.service',
              'ibmd.position_feed.adapters.sqlite_store',
          )

          for module in modules:
              importlib.import_module(module)
              print('import OK:', module)
          PY
