name: Agent branch workspace check

on:
  push:
    branches:
      - agent/simplify-rolling-price-pipeline

permissions:
  contents: write

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/simplify-rolling-price-pipeline

      - name: Verify writable branch workspace
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .agent-workspace-ready ]]; then
            echo "workspace marker already exists"
            exit 0
          fi
          printf 'ready\n' > .agent-workspace-ready
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent-workspace-ready
          git commit -m "ci: verify agent branch workspace"
          git push origin HEAD:agent/simplify-rolling-price-pipeline
